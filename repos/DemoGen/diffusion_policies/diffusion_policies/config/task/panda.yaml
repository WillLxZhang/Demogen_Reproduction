name: panda

task_name: ${name}

shape_meta: &shape_meta
  obs:
    point_cloud:
      shape: [1024, 6]
      type: point_cloud
    agent_pos:
      shape: [7]
      type: low_dim
  action:
    shape: [7]

env_runner:
  _target_: diffusion_policies.env_runner.robosuite_runner.RobosuiteRunner
  output_dir: ${hydra:run.dir}
  shape_meta: ${shape_meta}
  eval_episodes: 20
  max_steps: 300
  n_obs_steps: ${n_obs_steps}
  n_action_steps: ${n_action_steps}
  task_name: Lift
  device: ${training.device}

dataset:
  _target_: diffusion_policies.dataset.panda_dataset.PandaDataset
  zarr_path: data/lift.zarr
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1'}
  pad_after: ${eval:'${n_action_steps}-1'}
  seed: 42
  val_ratio: 0.00
  max_train_episodes: null
